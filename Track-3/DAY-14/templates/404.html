{% extends "base.html" %}

{% block title %}Page not found · ExpenseFlow{% endblock %}

{% block content %}
  <section class="empty-state large-empty not-found">
    <span class="empty-icon" aria-hidden="true">404</span>
    <p class="eyebrow">A little detour</p>
    <h1>We can’t find that page.</h1>
    <p>The page may have moved, or this expense may no longer exist.</p>
    <a class="button button-primary" href="{{ url_for('index') }}">Return to dashboard <span aria-hidden="true">→</span></a>
  </section>
{% endblock %}
