{% if form_errors %}
  <div class="form-alert" role="alert">
    <span class="form-alert-icon" aria-hidden="true">!</span>
    <div>
      <strong>Check the form and try again.</strong>
      <ul>
        {% for error in form_errors %}<li>{{ error }}</li>{% endfor %}
      </ul>
    </div>
  </div>
{% endif %}

<form action="{{ form_action }}" method="post" class="expense-form" data-expense-form novalidate>
  <div class="form-grid">
    <div class="field field-wide">
      <label for="title">Expense title <span aria-hidden="true">*</span></label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h8.17A2.5 2.5 0 0 1 16.44 4l3.56 3.56A2.5 2.5 0 0 1 21 9.33V18.5a2.5 2.5 0 0 1-2.5 2.5h-12A2.5 2.5 0 0 1 4 18.5v-13Z"/><path d="M8 13h8M8 17h5"/></svg>
        <input id="title" name="title" type="text" maxlength="100" value="{{ record.get('title', '') }}" placeholder="e.g. Weekly grocery run" required autofocus>
      </div>
      <p class="field-error" data-error-for="title"></p>
    </div>

    <div class="field">
      <label for="amount">Amount <span aria-hidden="true">*</span></label>
      <div class="input-wrap amount-wrap">
        <span class="currency-symbol" aria-hidden="true">₹</span>
        <input id="amount" name="amount" type="number" min="0.01" step="0.01" inputmode="decimal" value="{{ record.get('amount', '') }}" placeholder="0.00" required>
      </div>
      <p class="field-error" data-error-for="amount"></p>
    </div>

    <div class="field">
      <label for="expense_date">Expense date <span aria-hidden="true">*</span></label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
        <input id="expense_date" name="expense_date" type="date" value="{{ record.get('expense_date', today) }}" required>
      </div>
      <p class="field-error" data-error-for="expense_date"></p>
    </div>

    <div class="field">
      <label for="category">Category <span aria-hidden="true">*</span></label>
      <div class="input-wrap select-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M7 12h10M10 17h4"/></svg>
        <select id="category" name="category" required>
          <option value="" disabled {% if not record.get('category') %}selected{% endif %}>Choose a category</option>
          {% for category in categories %}
            <option value="{{ category }}" {% if record.get('category') == category %}selected{% endif %}>{{ category }}</option>
          {% endfor %}
        </select>
      </div>
      <p class="field-error" data-error-for="category"></p>
    </div>

    <div class="field">
      <label for="payment_mode">Payment mode <span aria-hidden="true">*</span></label>
      <div class="input-wrap select-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Z"/><path d="M3 9h18M7 15h3"/></svg>
        <select id="payment_mode" name="payment_mode" required>
          <option value="" disabled {% if not record.get('payment_mode') %}selected{% endif %}>Choose a payment mode</option>
          {% for payment_mode in payment_modes %}
            <option value="{{ payment_mode }}" {% if record.get('payment_mode') == payment_mode %}selected{% endif %}>{{ payment_mode }}</option>
          {% endfor %}
        </select>
      </div>
      <p class="field-error" data-error-for="payment_mode"></p>
    </div>

    <div class="field field-wide">
      <div class="label-row">
        <label for="description">Description <span class="optional">Optional</span></label>
        <span class="character-count" data-description-count>0 / 500</span>
      </div>
      <textarea id="description" name="description" maxlength="500" rows="5" placeholder="Add a note to make this expense easier to remember…" data-description-input>{{ record.get('description', '') }}</textarea>
      <p class="field-error" data-error-for="description"></p>
    </div>
  </div>

  <div class="form-actions">
    <a class="button button-secondary" href="{{ cancel_url }}">Cancel</a>
    <button class="button button-primary" type="submit">
      <span aria-hidden="true">{{ submit_icon }}</span> {{ submit_text }}
    </button>
  </div>
</form>
